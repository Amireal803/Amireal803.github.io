<header class="header">
    <nav class="header-nav custom-nav">
        <div class="nav-left">
            <a href="https://github.com/Amireal803" class="avatar-link" title="GitHub Profile" target="_blank" rel="noopener noreferrer">
                <img
                    src="https://github.com/Amireal803.png"
                    alt="GitHub Avatar"
                    class="github-avatar"
                    width="50"
                    height="50"
                    loading="eager"
                >
            </a>
            <div class="github-text-group">
                <a href="https://github.com/Amireal803" class="home-link" title="GitHub Profile" target="_blank" rel="noopener noreferrer">
                    Github
                </a>
                <span class="nav-subtitle">{{ site.Title }}</span>
            </div>
        </div>

        {{- /* ---- Center: Site Navigation ---- */}}
        <div class="nav-center">
            <ul class="center-menu">
                {{- $currentPage := . }}
                <li>
                    <a href="{{ "" | absLangURL }}" class="center-menu-link{{ if .IsHome }} active{{ end }}">
                        Home
                    </a>
                </li>
                <li>
                    <a href="{{ "/categories/" | absLangURL }}" class="center-menu-link{{ if hasPrefix $currentPage.RelPermalink "/categories/" }} active{{ end }}">
                        Categories
                    </a>
                </li>
                <li>
                    <a href="{{ "/tags/" | absLangURL }}" class="center-menu-link{{ if hasPrefix $currentPage.RelPermalink "/tags/" }} active{{ end }}">
                        Tags
                    </a>
                </li>
                <li>
                    <a href="{{ "/posts/" | absLangURL }}" class="center-menu-link{{ if hasPrefix $currentPage.RelPermalink "/posts/" }} active{{ end }}">
                        Posts
                    </a>
                </li>
            </ul>
        </div>

        {{- /* ---- Right: Search + Theme Toggle ---- */}}
        <div class="nav-right">
            <form class="search-form" action="{{ "/search/" | absLangURL }}" method="get" role="search">
                <input
                    id="header-search-input"
                    class="search-input"
                    type="search"
                    name="q"
                    placeholder="Search..."
                    aria-label="Search"
                    autocomplete="off"
                    maxlength="64"
                >
                <button type="submit" class="search-submit" aria-label="Submit search" title="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </form>

            {{- if not site.Params.disableThemeToggle }}
            <button id="theme-toggle" class="theme-toggle" accesskey="t" title="Toggle theme (Alt + T)" aria-label="Toggle theme">
                <svg class="moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
            {{- end }}
        </div>
    </nav>
</header>
